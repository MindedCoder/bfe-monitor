apiVersion: v1
kind: ConfigMap
metadata:
  name: bfe-monitor-config
  namespace: bfe
data:
  config.json: |
    {
      "port": 3000,
      "basePath": "/bfe-monitor",
      "baseUrl": "https://claw.bfelab.com",
      "pollIntervalMs": 5000,
      "timeoutMs": 10000,
      "instances": [
        "bfetest",
        "monitor"
      ]
    }
